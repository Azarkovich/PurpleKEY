<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="100" fill="#0e0e14"/>
  <rect x="24" y="24" width="464" height="464" rx="80" fill="#1a1628"/>

  <!-- Clé diagonale -->
  <circle cx="180" cy="196" r="88" fill="none" stroke="#7c3aed" stroke-width="32"/>
  <circle cx="180" cy="196" r="40" fill="#7c3aed"/>
  <circle cx="180" cy="196" r="16" fill="#c4b5fd"/>

  <!-- Corps de la clé -->
  <line x1="240" y1="256" x2="390" y2="400" stroke="#7c3aed" stroke-width="32" stroke-linecap="round"/>

  <!-- Dents -->
  <line x1="332" y1="358" x2="364" y2="326" stroke="#7c3aed" stroke-width="22" stroke-linecap="round"/>
  <line x1="362" y1="388" x2="394" y2="356" stroke="#7c3aed" stroke-width="22" stroke-linecap="round"/>

  <!-- Points circuit le long de la clé -->
  <circle cx="240" cy="256" r="10" fill="#a78bfa"/>
  <circle cx="282" cy="298" r="8" fill="#a78bfa" opacity="0.8"/>
  <circle cx="314" cy="330" r="8" fill="#a78bfa" opacity="0.7"/>
  <circle cx="390" cy="400" r="10" fill="#a78bfa"/>

  <!-- Halo anneau extérieur clé -->
  <circle cx="180" cy="196" r="88" fill="none" stroke="#a78bfa" stroke-width="4" stroke-dasharray="14 10" opacity="0.35"/>
</svg>
