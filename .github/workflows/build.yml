name: Build PurpleKEY

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: PurpleKEY-linux
          - os: windows-latest
            name: PurpleKEY-windows.exe
          - os: macos-latest
            name: PurpleKEY-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Compiler
        run: pyinstaller --onefile --windowed --name ${{ matrix.name }} main.py

      - name: Créer la Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.name }}
